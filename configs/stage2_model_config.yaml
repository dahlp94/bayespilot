data:
  path: datasets/churn.csv
  target: churn

split:
  test_size: 0.2
  random_seed: 42
  stratify: true

models:
  candidates:
    - logistic_regression
    - random_forest
    - gradient_boosting

  logistic_regression:
    max_iter: 1000

  random_forest:
    n_estimators: 200
    max_depth: 8
    random_state: 42

  gradient_boosting:
    n_estimators: 150
    learning_rate: 0.05
    max_depth: 3
    random_state: 42

calibration:
  enabled: true
  method: sigmoid

thresholds:
  low: 0.3
  high: 0.7
  sweep:
    enabled: true
    start: 0.1
    end: 0.9
    step: 0.05

artifacts:
  model_dir: models/artifacts
  deployed_model_path: models/artifacts/deployed_pipeline.pkl

reports:
  output_dir: reports/stage2

mlflow:
  experiment_name: BayesPilot-Stage2
